# Weekly, move each submodule to its upstream tip and open a pull request for
# it. The PR is what gets tested: pr-test.yaml builds it like any other, so a
# bump that breaks the build never reaches main.

name: 'Update submodules'

on:
  schedule:
    - cron: '0 8 * * 6'      # Saturdays at 08:00 (UTC)
  workflow_dispatch:

jobs:
  bump:
    name: 'Bump ${{ matrix.name }} to upstream'
    runs-on: kolibri-toolchain
    permissions:
      contents: write
      pull-requests: write

    strategy:
      fail-fast: false   # one submodule going wrong must not skip the others
      matrix:
        include:
          # compilers first: everything else is built with them
          - name: cmm
            path: programs/develop/cmm
          - name: oberon07
            path: programs/develop/oberon07
          - name: kterm
            path: programs/other/kterm

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Bump ${{ matrix.name }} and open PR
        env:
          TOKEN: ${{ github.token }}
          API: ${{ github.api_url }}
          REPO: ${{ github.repository }}
          NAME: ${{ matrix.name }}
          PATH_: ${{ matrix.path }}
          BRANCH: chore/update-${{ matrix.name }}
        run: |
          set -euo pipefail

          git submodule update --remote "$PATH_"

          # look only at this submodule: the other jobs in the matrix are
          # bumping their own, and the rest of the tree is none of our business
          if git diff --quiet -- "$PATH_"; then
            echo "$NAME is already up to date"
            exit 0
          fi

          git config user.name  "kolibri-bot"
          git config user.email "bot@kolibrios.org"
          git checkout -B "$BRANCH"
          git commit -m "$NAME: bump submodule to upstream" -- "$PATH_"
          git push -f origin "$BRANCH"

          # Open a PR via the Gitea API using the built-in token.
          # 201 = created, 409 = a PR for this branch is already open (the
          # force-push above already updated it) - both are fine.
          http=$(curl -sS -o /tmp/pr.json -w '%{http_code}' -X POST \
            -H "Authorization: token ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"head\":\"${BRANCH}\",\"base\":\"main\",\"title\":\"${NAME}: bump submodule to upstream\"}" \
            "${API}/repos/${REPO}/pulls")
          echo "PR API HTTP status: $http"
          cat /tmp/pr.json; echo
          if [ "$http" != "201" ] && [ "$http" != "409" ]; then
            echo "Failed to create pull request"
            exit 1
          fi
